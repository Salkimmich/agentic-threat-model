name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdown:
    name: Markdown quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
